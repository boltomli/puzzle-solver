repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        language: system
        entry: .venv/Scripts/ruff check --fix
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        language: system
        entry: .venv/Scripts/ruff format
        types: [python]
        pass_filenames: true
